<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #fdfdfd;
      }
    </style>
  </head>

  <body>
    <div
      id="translation-mirror"
      style="opacity: 0; position: absolute; pointer-events: none"
    ></div>
    <script>
      let addBtn;
      let myFont;
      let knownTable, unknownTable;
      let knownWords = [];
      let unknownWords = [];
      let words = [];

      const TOTAL_WORDS = 40;
      const KNOWN_PERC = 0.3;

      // --- STEP 1: PRELOAD ASSETS ---
      function preload() {
        // Make sure these paths match your website folder structure exactly
        myFont = loadFont("noto_font.ttf");
        knownTable = loadTable("krn_words/known.csv", "csv");
        unknownTable = loadTable("krn_words/unknown.csv", "csv");
      }

      // --- STEP 2: SETUP DATA ---
      function setup() {
        createCanvas(windowWidth, windowHeight);
        textFont(myFont);
        textSize(30);

        // Get the very first row of the table
        let kRow = knownTable.getRow(0);
        let uRow = unknownTable.getRow(0);

        // Use the TABLE's column count to loop through the row
        if (kRow) {
          for (let c = 0; c < knownTable.getColumnCount(); c++) {
            let val = kRow.getString(c);
            if (val && val.trim() !== "") knownWords.push(val.trim());
          }
        }

        if (uRow) {
          for (let c = 0; c < unknownTable.getColumnCount(); c++) {
            let val = uRow.getString(c);
            if (val && val.trim() !== "") unknownWords.push(val.trim());
          }
        }

        textFont(myFont);
        for (let i = 0; i < TOTAL_WORDS; i++) {
          words.push(new WordQueue());
        }

        // Set the initial/default style
        addBtn = createButton("단어 넣기");
        updateButtonPosition(); // Position it based on the current window size
        styleButton(addBtn, false);

        // Mouse interaction listeners
        addBtn.mouseOver(() => styleButton(addBtn, "hover"));
        addBtn.mouseOut(() => styleButton(addBtn, "default"));

        // New click listeners
        addBtn.mousePressed(() => {
          styleButton(addBtn, "clicked");
          addNewWord();
          setTimeout(() => {
            // Check if the mouse is still hovering after the tap
            if (addBtn.elt.matches(":hover")) {
              styleButton(addBtn, "hover");
            } else {
              styleButton(addBtn, "default");
            }
          }, 150);
        });
      }

      // --- STEP 3: THE ANIMATION LOOP ---
      function draw() {
        background(40); // Light gray background

        for (let i = 0; i < 100; i++) {
          stroke(200, 200, 200, 20); // Very faint "glaze particles"
          point(random(width), random(height));
        }

        for (let i = 0; i < words.length; i++) {
          let w = words[i];
          w.move();
          w.display();

          // Check for collisions against other words
          for (let j = i + 1; j < words.length; j++) {
            let other = words[j];
            if (w.collide(other)) {
              w.bounce();
              other.bounce();

              // 2. THE FIqX: Static Separation
              // Calculate the vector between the two words
              let pushVec = p5.Vector.sub(w.pos, other.pos);
              pushVec.normalize();

              // Move them slightly away from each other immediately
              // This prevents them from being "stuck" inside each other
              w.pos.add(pushVec.mult(2));
              other.pos.sub(pushVec.mult(2));

              w.nextWord();
              other.nextWord();
            }
          }

          // Cursor Collision
          let d = dist(mouseX, mouseY, w.pos.x + w.w / 2, w.pos.y - w.h / 2);
          if (d < 50) {
            // 50 is the "push" radius
            w.bounce((from_cursor = true));
            w.nextWord();

            // Anti-stuck: Push the word slightly away from the mouse
            let pushDir = createVector(w.pos.x - mouseX, w.pos.y - mouseY);
            pushDir.normalize();
            w.pos.add(pushDir.mult(30));
          }
        }

        noFill();
      }

      // --- STEP 4: DEFINE THE LOGIC CLASS ---
      class WordQueue {
        constructor(isNew = false) {
          this.pos = createVector(random(width), random(height));
          this.vel = p5.Vector.random2D().mult(random(2, 5));

          // If it's a "newly added" word, start the glow at 1.0 (100%)
          this.glow = isNew ? 1.0 : 0;

          this.element = createSpan(this.txt);
          this.element.parent("translation-mirror");

          this.nextWord();
        }

        updateContent() {
          // Safety check: If arrays are empty, use fallback text
          let kList = knownWords.length > 0 ? knownWords : ["Known"];
          let uList = unknownWords.length > 0 ? unknownWords : ["Unknown"];

          this.isKnown = random() < KNOWN_PERC;

          // Pick a truly random index from the appropriate list
          if (this.isKnown) {
            this.txt = random(kList);
          } else {
            this.txt = random(uList);
          }

          this.w = textWidth(this.txt);
          this.h = 30; // Height based on your textSize(30)
        }

        magnitude() {
          return sqrt(this.vel.x * this.vel.x + this.vel.y * this.vel.y);
        }

        move() {
          this.pos.add(this.vel);

          // X-axis (Left and Right)
          if (this.pos.x < 0) {
            this.pos.x = 0; // Snap back to edge
            this.vel.x *= -1;
          } else if (this.pos.x + this.w > width) {
            this.pos.x = width - this.w; // Snap back to edge
            this.vel.x *= -1;
          }

          // Y-axis (Top and Bottom)
          // Note: this.h is used to prevent words from going off the top
          if (this.pos.y < this.h) {
            this.pos.y = this.h;
            this.vel.y *= -1;
          } else if (this.pos.y > height) {
            this.pos.y = height;
            this.vel.y *= -1;
          }
        }

        display() {
          // IMPORTANT: We draw the text from the HTML element,
          // NOT the original variable. This way, if Chrome
          // translates the element, the canvas updates too!
          let displayedText = this.element.elt.innerText;

          // Define our colors
          let finalColor = this.isKnown
            ? color(100, 255, 100)
            : color(255, 100, 100);
          let birthColor = color(255, 255, 150); // Bright yellowish "Fresh Ingredient" glow

          // Linearly interpolate (lerp) between the birth color and the final color
          // Based on the current glow value
          let currentColor = lerpColor(finalColor, birthColor, this.glow);

          // Apply glow effect based on the fade amount
          drawingContext.shadowBlur = this.glow * 30; // Stronger glow when new
          drawingContext.shadowColor = currentColor;

          fill(currentColor);
          noStroke();
          text(displayedText, this.pos.x, this.pos.y);

          // Slowly fade the glow effect every frame
          if (this.glow > 0) {
            this.glow -= 0.0005; // Adjust this number to make it fade faster or slower
          } else {
            this.glow = 0;
            drawingContext.shadowBlur = 0;
          }
          drawingContext.shadowBlur = 0;
        }

        collide(other) {
          // Simple rectangular collision check
          return (
            this.pos.x < other.pos.x + other.w &&
            this.pos.x + this.w > other.pos.x &&
            this.pos.y < other.pos.y + other.h &&
            this.pos.y + this.h > other.pos.y
          );
        }

        bounce(from_cursor = false) {
          // Reverse direction
          this.vel.x *= -1;
          this.vel.y *= -1;

          if (from_cursor) {
            this.vel.x *= 1.2;
            this.vel.y *= 1.2;
          } else {
            // Apply viscosity to slow down over time
            if (this.magnitude() > 3) {
              // Only apply if it's moving fast enough
              this.vel.mult(0.9);
            }
          }

          // Add a tiny bit of random variation so it doesn't get stuck in a loop
          this.vel.rotate(random(-0.1, 0.1));
        }

        nextWord() {
          this.updateContent();

          if (this.element) {
            this.element.html(this.txt);
          }
        }
      }

      function windowResized() {
        // 1. Resize the canvas to fit the new window size
        resizeCanvas(windowWidth, windowHeight);

        // 2. Reposition the button relative to the new width/height
        updateButtonPosition();
      }

      // A helper function so you don't have to write the math twice
      function updateButtonPosition() {
        // Only run this if addBtn has been defined in setup()
        if (addBtn) {
          let x = windowWidth - 150;
          let y = 25;
          addBtn.position(x, y);

          // You can also re-apply styles here if needed
          addBtn.style("font-size", "16px");
        }
      }

      function addNewWord() {
        // Pass 'true' to the constructor to trigger the birth glow
        let newW = new WordQueue(true);

        // Position it at a random location
        newW.pos = createVector(random(0, width), random(0, height));
        newW.vel = p5.Vector.random2D().mult(6); // Give it a little extra speed

        words.push(newW);
      }
      function styleButton(btn, state) {
        // 1. CRITICAL: Allow the button to be transformed
        btn.style("display", "inline-block");
        btn.style(
          "transition",
          "transform 0.1s ease, background-color 0.1s ease",
        );
        // Base Styles
        btn.style("padding", "12px 24px");
        btn.style("border-radius", "8px");
        btn.style("color", "#fff");
        btn.style("font-family", "sans-serif");
        btn.style("cursor", "pointer");
        btn.style("transition", "all 0.1s"); // Faster transition for clicks

        if (state === "clicked") {
          // Lighter color when clicked
          btn.style("background-color", "#888");
          btn.style("border", "1px solid #fff");
          btn.style("box-shadow", "0 0 30px rgba(255, 255, 255, 0.8)");
          btn.style("transform", "scale(0.95)"); // Slight "press" effect
        } else if (state === "hover") {
          btn.style("background-color", "#444");
          btn.style("border", "1px solid #fff");
          btn.style("box-shadow", "0 0 20px rgba(255, 255, 150, 0.6)");
          btn.style("transform", "scale(1.02)"); // Slight pop out
        } else {
          // Default State
          btn.style("background-color", "#222");
          btn.style("border", "1px solid #666");
          btn.style("box-shadow", "none");
          btn.style("transform", "scale(1.0)");
        }
      }
    </script>
  </body>
</html>
